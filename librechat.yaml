version: 1.3.8

cache: true

interface:
  customWelcome: 'Welcome to futureProof ... we look forward to building this together'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: false
  bookmarks: true
  multiConvo: true
  fileCitations: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  agents:
    use: true
    create: true
    share: false
    public: false
  marketplace:
    use: true
  mcpServers:
    use: true
    create: true
    share: false
    public: false

rateLimits:
  fileUploads:
    ipMax: 20
    ipWindowInMinutes: 60
    userMax: 20
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 10
    ipWindowInMinutes: 60
    userMax: 10
    userWindowInMinutes: 60

fileConfig:
  serverFileSizeLimit: 5
  avatarSizeLimit: 2
  default:
    fileSizeLimit: 5
    totalSizeLimit: 20

memory:
  disabled: true

webSearch:
  serperApiKey: '${SERPER_API_KEY}'

endpoints:
  anthropic:
    apiKey: '${ANTHROPIC_API_KEY}'
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
    titleConvo: true
    titleModel: 'claude-haiku-4-5-20251001'

mcpServers:
  futureproof:
    type: streamable-http
    url: https://mcp.befutureproof.ai
    timeout: 30000
    initTimeout: 30000
